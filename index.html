<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>The June Pearl</title>

    <!-- Main stylesheet -->
    <link rel="stylesheet" href="./styles.css" />

    <!-- Optional: preload fonts you add later (see styles.css @font-face notes) -->
    <!-- <link rel="preload" href="./assets/fonts/TAN-Pearl.woff2" as="font" type="font/woff2" crossorigin />
    <link rel="preload" href="./assets/fonts/HelloParisScript.woff2" as="font" type="font/woff2" crossorigin /> -->
  </head>

  <body>
    <header class="site-header">
      <a class="brand" href="#" aria-label="June Pearl Co home">
        June Pearl. Co
      </a>

      <nav class="nav" aria-label="Primary navigation">
        <a class="nav__link is-active" href="#">Home</a>
        <a class="nav__link" href="#about">About</a>
        <a class="nav__link" href="#contact">Contact</a>
      </nav>
    </header>

    <main class="hero" aria-label="Landing hero">
      <!-- Center tag image -->
      <div class="hero__tag" aria-hidden="true">
        <img
          class="hero__tag-img"
          src="./assets/tag.jpg"
          alt=""
          loading="eager"
          decoding="async"
        />
      </div>

      <!-- Title + script word -->
      <div class="hero__type">
        <h1 class="hero__title">The June Pearl</h1>
        <div class="hero__script">Jewelry</div>
      </div>

      <!-- CTA -->
      <div class="hero__cta">
        <a class="btn" href="#shop">Shop All</a>
      </div>
    </main>

    <!-- Placeholder sections for later -->
    <section id="about" class="section">
      <!-- Add content later -->
    </section>

    <section id="contact" class="section">
      <!-- Add content later -->
    </section>

    <section id="shop" class="section">
      <!-- Add content later -->
    </section>
  </body>
</html>
